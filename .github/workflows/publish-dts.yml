name: Publish-DTS

on:
  workflow_dispatch:


jobs:
  publish:
    name: "Publish to npm registry"
    runs-on: ubuntu-latest
    steps:
      
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.17.0'
          cache: 'npm'

      - uses: ./.github/actions/setup-env

      - run: npm ci

      - run: npm run generate:dts

      - run: npx eslint --fix "./packages/cocos-cli-types/*.d.ts"

      - run: npx jest packages/cocos-cli-types --roots="<rootDir>/packages/cocos-cli-types"

      - uses: JS-DevTools/npm-publish@4b07b26a2f6e0a51846e1870223e545bae91c552
        with:
          token: ${{ secrets.NPM_PUBLISH }}
          registry: "https://registry.npmjs.org"
          package: packages/cocos-cli-types